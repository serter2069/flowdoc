:root {
  --bg: #0b1020;
  --bg-elevated: #131a35;
  --panel: #181f3d;
  --panel-soft: #1f2748;
  --border: #2a335a;
  --text: #e5e9f5;
  --text-muted: #98a0c2;
  --accent: #7aa2ff;
  --accent-strong: #a4bfff;
  --highlight: #f2c046;
  --shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family:
    ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter,
    "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-columns: 300px 1fr 380px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
}

.topbar .title {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.topbar .title h1 {
  font-size: 16px;
  margin: 0;
  font-weight: 600;
  letter-spacing: 0.2px;
}

.topbar .title .sub {
  font-size: 12px;
  color: var(--text-muted);
}

.topbar .badge {
  font-size: 11px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 999px;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
}

.sidebar .section {
  padding: 14px 16px 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

.sidebar .role-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 12px 8px;
}

.role-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  background: var(--panel-soft);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 5px 10px;
  cursor: pointer;
  transition: transform 100ms ease, border-color 120ms ease, background 120ms ease;
}

.role-chip:hover {
  background: var(--bg-elevated);
}

.role-chip.active {
  background: color-mix(in srgb, var(--role-color, var(--accent)) 22%, var(--panel-soft));
  border-color: var(--role-color, var(--accent));
}

.role-chip .role-icon {
  color: var(--role-color, var(--accent));
}

.sidebar .search {
  padding: 0 16px 8px;
}

.sidebar input {
  width: 100%;
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
}

.sidebar input:focus {
  border-color: var(--accent);
}

.sidebar .flow-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.sidebar .flow-list li {
  margin: 0 8px 6px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
  border: 1px solid transparent;
  border-left: 3px solid var(--role-color, var(--border));
  background: transparent;
}

.sidebar .flow-list li:hover {
  background: var(--panel-soft);
}

.sidebar .flow-list li.active {
  background: var(--panel-soft);
  border-color: var(--role-color, var(--accent));
  border-left-width: 3px;
}

.sidebar .flow-list .name {
  font-weight: 600;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.role-icon-inline {
  font-size: 14px;
}

.sidebar .flow-list .desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.35;
}

.sidebar .tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.sidebar .tag {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  background: var(--bg-elevated);
  border-radius: 4px;
  padding: 2px 6px;
}

/* ── Canvas ─────────────────────────────────────────────── */
.canvas {
  position: relative;
  background:
    radial-gradient(circle at 25% 15%, rgba(122, 162, 255, 0.08), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(242, 192, 70, 0.06), transparent 55%),
    var(--bg);
}

/* Screen node */
.screen-node {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  min-width: 180px;
  max-width: 220px;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: transform 160ms ease;
}

.screen-node .screen-head {
  display: flex;
  align-items: center;
  gap: 8px;
}

.screen-step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 999px;
  color: #0b1020;
  font-weight: 700;
  font-size: 12px;
  flex-shrink: 0;
}

.screen-kind {
  font-size: 16px;
}

.screen-name {
  font-weight: 600;
  font-size: 13px;
  line-height: 1.2;
}

.screen-pathline {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.screen-actor {
  margin-top: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* React Flow edges */
.react-flow__edge-path {
  stroke-width: 2;
}

.flow-counter {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--text-muted);
  z-index: 5;
}

/* ── Detail panel ────────────────────────────────────── */
.detail {
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px;
}

.detail h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
}

.detail .desc {
  color: var(--text-muted);
  margin: 8px 0 16px;
  font-size: 13px;
  line-height: 1.5;
}

.detail .steps {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.detail .step {
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid var(--role-color, var(--accent));
}

.detail .step .head {
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail .step .num {
  font-size: 12px;
  color: var(--bg);
  background: var(--role-color, var(--accent));
  border-radius: 999px;
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  flex-shrink: 0;
}

.actor-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
  font-size: 12px;
  color: var(--role-color, var(--text));
}

.kind-chip {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  margin-left: auto;
}

.detail .step .screen-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.screen-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  font-size: 12px;
}

.screen-pill .screen-path {
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
}

.detail .step .arrow {
  color: var(--text-muted);
}

.detail .step .action {
  margin-top: 10px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text);
}

.detail .step .note {
  color: var(--text-muted);
  font-size: 12px;
  line-height: 1.5;
  margin-top: 8px;
  font-style: italic;
}

.server-chip {
  margin-top: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  font-size: 11px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.server-chip .server-icon {
  color: var(--accent);
  margin-right: 4px;
}

.server-chip code {
  color: var(--text);
  font-family: inherit;
}

.server-chip .returns {
  color: var(--text-muted);
}

.server-chip .server-note {
  color: var(--text-muted);
  font-style: italic;
}

.handoff {
  margin-bottom: 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--highlight);
  background: rgba(242, 192, 70, 0.08);
  border: 1px dashed rgba(242, 192, 70, 0.4);
  border-radius: 6px;
  padding: 6px 8px;
}

.empty {
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

@media (max-width: 1100px) {
  .app {
    grid-template-columns: 260px 1fr 320px;
  }
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr auto;
  }
  .sidebar {
    max-height: 220px;
  }
  .detail {
    max-height: 320px;
  }
}

e picker for each photo slot","kind":"fill"},{"actor":"worker","on":"complete-booking","action":"For each photo: pick or capture with expo-image-picker","to":"complete-booking","kind":"tap","server":{"label":"POST /api/v1/bookings/upload-photo (multipart)","note":"PhotoUploadService::storeTemp only writes S3 temp/. No DB write yet — the path is held in mobile state and submitted with the rest of the form.","returns":"{ path: 'temp/bookings/{uuid}.{ext}' }"}},{"actor":"worker","on":"complete-booking","action":"Tap 'Submit'","to":"my-jobs","kind":"submit","server":{"label":"POST /api/v1/bookings/{id}/complete","note":"Booking.status flips to 'Completed' inside a transaction. PhotoUploadService::moveToBooking promotes the temp paths to permanent and writes them into bookings.photos (JSON array)."},"note":"Job disappears from 'Dispatched' tab; reappears in 'Completed'. The status change triggers the review email — see next journey."}]},{"id":"customer-review","name":"Customer: receive review email → submit NPS","description":"Triggered by the worker's 'Submit' in the previous journey. A model observer on Booking spots the status flip to 'Completed' and queues SendReviewRequestJob, which emails the customer a tokenized link.","primaryActor":"customer","tags":["feedback","public"],"steps":[{"actor":"worker","on":"complete-booking","action":"(Triggered by the worker submitting in the previous journey)","to":"customer-email","kind":"wait","server":{"label":"Booking::booted() observer → SendReviewRequestJob::dispatch(bookingId)","note":"Booking.php:37 — `wasChanged('status') && status === 'Completed'`. Job sends the email via EmailService (SendReviewRequestJob.php:54)."},"note":"Background job — runs on the queue worker, not in-request."},{"actor":"customer","on":"customer-email","action":"See 'How did we do?' email in inbox","kind":"receive"},{"actor":"customer","on":"customer-email","action":"Tap the signed link in the email","to":"review-page","kind":"tap","note":"Opens h
