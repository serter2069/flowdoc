:root {
  --bg: #0b1020;
  --bg-elevated: #131a35;
  --panel: #181f3d;
  --panel-soft: #1f2748;
  --border: #2a335a;
  --text: #e5e9f5;
  --text-muted: #98a0c2;
  --accent: #7aa2ff;
  --accent-strong: #a4bfff;
  --highlight: #f2c046;
  --shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
}

* {
  box-sizing: border-box;
}

html,
body,
#root {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family:
    ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter,
    "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: grid;
  grid-template-columns: 300px 1fr 360px;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
}

.topbar .title {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.topbar .title h1 {
  font-size: 16px;
  margin: 0;
  font-weight: 600;
}

.topbar .title .sub {
  font-size: 12px;
  color: var(--text-muted);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.kbd-help-btn {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

.kbd-help-btn:hover {
  color: var(--text);
  border-color: var(--accent);
}

.topbar .badge {
  font-size: 11px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 999px;
}

/* ── Sidebar ──────────────────────────────────────────── */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar .section {
  padding: 12px 16px 6px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.muted-count {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-elevated);
  border-radius: 4px;
  padding: 2px 6px;
  text-transform: none;
  letter-spacing: 0;
  font-weight: 600;
}

.sidebar .chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 12px 6px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  background: var(--panel-soft);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 4px 9px;
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease;
}

.chip:hover {
  background: var(--bg-elevated);
}

.chip.active {
  background: color-mix(in srgb, var(--chip-color, var(--accent)) 25%, var(--panel-soft));
  border-color: var(--chip-color, var(--accent));
}

.chip .chip-icon {
  color: var(--chip-color, var(--accent));
}

.kind-chip-filter .chip-icon {
  color: var(--text-muted);
}

.sidebar .search {
  padding: 0 16px 8px;
}

.sidebar input {
  width: 100%;
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  padding: 7px 10px;
  outline: none;
}

.sidebar input:focus {
  border-color: var(--accent);
}

.grouped-list {
  padding: 4px 0 24px;
  flex: 1;
}

.group-block {
  margin-bottom: 6px;
}

.group-head {
  padding: 8px 16px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--group-color, var(--text-muted));
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  width: 100%;
  background: transparent;
  border: 0;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  border-radius: 0;
}

.group-head:hover {
  background: var(--panel-soft);
}

.group-head .chevron {
  display: inline-block;
  width: 12px;
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 120ms ease;
}

.group-head.is-collapsed .chevron {
  color: var(--group-color, var(--text-muted));
}

.group-head-name {
  flex: 1;
}

.group-head .muted-count {
  flex-shrink: 0;
}

.screen-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.screen-list li {
  margin: 0 8px 1px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid transparent;
}

.screen-list li:hover {
  background: var(--panel-soft);
}

.screen-list li.active {
  background: var(--panel-soft);
  border-color: var(--accent);
}

.screen-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.kind-glyph {
  font-size: 14px;
  width: 18px;
  text-align: center;
  color: var(--text-muted);
  flex-shrink: 0;
}

.screen-row-name {
  font-size: 13px;
  font-weight: 500;
}

.screen-row-path {
  font-size: 10px;
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  margin-left: 24px;
  display: block;
  margin-top: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.empty-inline {
  color: var(--text-muted);
  padding: 16px;
  font-size: 13px;
  text-align: center;
}

/* ── Canvas ──────────────────────────────────────────── */
.canvas {
  position: relative;
  background:
    radial-gradient(circle at 25% 15%, rgba(122, 162, 255, 0.06), transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(242, 192, 70, 0.04), transparent 55%),
    var(--bg);
}

.site-node {
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  min-width: 180px;
  max-width: 220px;
  color: var(--text);
  transition: opacity 180ms ease, transform 180ms ease;
}

.site-node.is-modal {
  border-style: dashed;
}

.site-node-head {
  display: flex;
  align-items: center;
  gap: 6px;
}

.site-node-icon {
  font-size: 14px;
  flex-shrink: 0;
}

.site-node-name {
  font-weight: 600;
  font-size: 12px;
  line-height: 1.2;
}

.site-node-path {
  margin-top: 4px;
  font-size: 10px;
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.site-node.is-dimmed {
  opacity: 0.18;
}

.site-node.is-selected {
  transform: scale(1.04);
}

/* Group cluster (parent node) — sits behind screens */
.group-cluster {
  width: 100%;
  height: 100%;
  border: 2px solid;
  border-radius: 14px;
  position: relative;
  pointer-events: none;
}

.group-cluster-label {
  position: absolute;
  top: -12px;
  left: 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  pointer-events: none;
  border: 2px solid;
  white-space: nowrap;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
}

.group-cluster-count {
  font-size: 10px;
  color: rgba(11, 16, 32, 0.7);
  background: rgba(11, 16, 32, 0.18);
  border-radius: 4px;
  padding: 1px 6px;
  font-weight: 700;
}

/* ── Detail panel ──────────────────────────────────── */
.detail {
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px;
}

.detail h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
}

.badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.kind-pill,
.group-pill,
.role-pill {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: 4px;
  padding: 3px 8px;
  font-weight: 600;
}

.kind-pill {
  background: var(--bg-elevated);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.group-pill {
  background: color-mix(in srgb, var(--group-color, var(--accent)) 18%, transparent);
  color: var(--group-color, var(--accent));
  border: 1px solid color-mix(in srgb, var(--group-color, var(--accent)) 40%, var(--border));
}

.role-pill {
  background: color-mix(in srgb, var(--role-color, var(--accent)) 18%, transparent);
  color: var(--role-color, var(--accent));
  border: 1px solid color-mix(in srgb, var(--role-color, var(--accent)) 40%, var(--border));
}

.path-line {
  margin-top: 10px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 8px;
  overflow-x: auto;
}

.detail .desc {
  color: var(--text-muted);
  margin: 12px 0;
  font-size: 13px;
  line-height: 1.55;
}

.section-head {
  margin-top: 18px;
  margin-bottom: 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.component-list,
.nav-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.component-list li {
  font-size: 12px;
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text);
}

.nav-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 7px 10px;
  background: var(--panel-soft);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: background 120ms ease;
}

.nav-list li:hover {
  background: var(--bg-elevated);
}

.nav-list .arrow {
  color: var(--text-muted);
}

.nav-list .link-name {
  font-weight: 600;
}

.nav-list .kind-mini {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
}

.nav-list .link-label {
  margin-left: auto;
  font-style: italic;
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 11px;
}

.empty {
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  text-align: center;
  padding: 20px;
}

/* Keyboard help overlay */
.kbd-help {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 30, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

.kbd-help-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px 24px;
  width: 360px;
  max-width: calc(100vw - 32px);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.kbd-help-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.kbd-help-head h3 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
}

.kbd-help-close {
  background: transparent;
  border: 0;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}

.kbd-help-close:hover {
  color: var(--text);
}

.kbd-help ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.kbd-help li {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text);
}

.kbd-help kbd {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 5px;
  padding: 3px 7px;
  font-size: 11px;
  color: var(--text);
  min-width: 22px;
  text-align: center;
  display: inline-block;
}

.kbd-help li > span {
  flex: 1;
  color: var(--text-muted);
}

.kbd-help-hint {
  color: var(--text-muted);
  font-size: 12px;
  margin: 14px 0 0;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-style: italic;
}

@media (max-width: 1100px) {
  .app {
    grid-template-columns: 240px 1fr 300px;
  }
}

@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr auto;
  }
  .sidebar {
    max-height: 220px;
  }
  .detail {
    max-height: 320px;
  }
}
